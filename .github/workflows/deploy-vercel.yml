# Production deploy via Vercel CLI (alternative to Vercel’s native “Import Git Repository”).
# Prereq: create a Vercel project with Root Directory = frontend, then add the three secrets below.
# If you only use Vercel’s Git integration, disable this workflow (delete this file or set jobs.deploy.if to false).
name: Deploy (Vercel)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Remove the line below after adding VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID in repo Settings → Secrets.
    if: ${{ vars.ENABLE_VERCEL_ACTION == 'true' }}

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
