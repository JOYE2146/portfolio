<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="Yoseph Bedasa — full-stack web developer and network engineer. React, TypeScript, Firebase, portfolio, architecture notes, and blog."
    />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fafafa" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090b" />
    <link rel="preconnect" href="https://cdn.simpleicons.org" crossorigin />
    <title>Yoseph Bedasa · Portfolio</title>
    <!-- FOUC: set .dark before first paint; must match hooks/theme.ts + THEME_STORAGE_KEY -->
    <script>
      (function () {
        try {
          var KEY = "portfolio-theme-preference";
          var root = document.documentElement;
          var stored = localStorage.getItem(KEY);
          var dark;
          if (stored === "light") dark = false;
          else if (stored === "dark") dark = true;
          else
            dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          root.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
